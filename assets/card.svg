<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 700" width="820" height="700" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFF1F3"/>
      <stop offset="0.46" stop-color="#CDD1D6"/>
      <stop offset="1" stop-color="#A6ABB2"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A6ABB2"/>
      <stop offset="1" stop-color="#CDD1D6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2F6"/>
    </linearGradient>
    <radialGradient id="knob" cx="0.38" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#EFF1F3"/>
      <stop offset="1" stop-color="#A6ABB2"/>
    </radialGradient>
  </defs>

  <!-- body -->
  <rect x="8" y="8" width="804" height="684" rx="30" fill="url(#body)" stroke="#868C93" stroke-width="1"/>

  <!-- top deck -->
  <text x="44" y="48" font-size="12" font-weight="700" letter-spacing="3.4" fill="#454B53">CRYSTAL·<tspan fill="#39628A">SHOT</tspan></text>
  <circle cx="690" cy="44" r="2" fill="#868C93"/>
  <circle cx="700" cy="44" r="2" fill="#868C93"/>
  <circle cx="710" cy="44" r="2" fill="#868C93"/>
  <circle cx="766" cy="44" r="15" fill="url(#knob)" stroke="#868C93" stroke-width="1"/>

  <!-- LCD frame + screen -->
  <rect x="36" y="68" width="748" height="556" rx="18" fill="url(#frame)"/>
  <rect x="48" y="80" width="724" height="532" rx="10" fill="url(#screen)" stroke="#22272C" stroke-width="2"/>

  <!-- focus brackets -->
  <g stroke="#A6ADB5" stroke-width="1.5" fill="none">
    <path d="M62,94 h15 M62,94 v15"/>
    <path d="M758,94 h-15 M758,94 v15"/>
    <path d="M62,598 h15 M62,598 v-15"/>
    <path d="M758,598 h-15 M758,598 v-15"/>
  </g>

  <!-- HUD -->
  <g font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11">
    <circle cx="84" cy="116" r="4" fill="#C4564C"/>
    <text x="94" y="120" font-weight="700" letter-spacing="1" fill="#C4564C">REC</text>
    <text x="144" y="120" letter-spacing="1" fill="#39628A">2026·07·09</text>
    <rect x="706" y="112" width="19" height="10" rx="2" fill="none" stroke="#7C848D" stroke-width="1"/>
    <rect x="708.5" y="114.5" width="11" height="5" fill="#7C848D"/>
    <rect x="725" y="115" width="2.4" height="4" fill="#7C848D"/>
  </g>

  <!-- identity -->
  <text x="410" y="182" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="10" letter-spacing="2.6" fill="#7C848D">UC BERKELEY · CS + APPLIED MATH</text>
  <text x="410" y="234" text-anchor="middle" font-size="45" font-weight="700" letter-spacing="6" fill="#14181D">CRYSTAL CHENG</text>
  <text x="410" y="264" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" letter-spacing="2.2" fill="#454B53">SOFTWARE ENGINEER · ML / AI</text>
  <text x="410" y="300" text-anchor="middle" font-size="14.5" fill="#454B53">I build <tspan fill="#39628A" font-weight="600">privacy-first AI</tspan>, small enough to run on</text>
  <text x="410" y="321" text-anchor="middle" font-size="14.5" fill="#454B53">your phone instead of a server. Currently at Hyve Solutions.</text>

  <!-- exposure -->
  <text x="78" y="374" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="10" letter-spacing="2.6" fill="#7C848D">PROJECTS</text>
  <g>
    <text x="78" y="408" font-size="13" font-weight="700" letter-spacing="1" fill="#14181D">FRESHCHECK</text>
    <text x="214" y="408" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" fill="#454B53">24K-param CNN · 115 KB · sub-10ms · <tspan fill="#39628A">runs on-device</tspan></text>
    <text x="78" y="440" font-size="13" font-weight="700" letter-spacing="1" fill="#14181D">MBTI GUESSER</text>
    <text x="214" y="440" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" fill="#454B53">zero-shot BART-MNLI over text, image + numeric signals</text>
    <text x="78" y="472" font-size="13" font-weight="700" letter-spacing="1" fill="#14181D">REPORANK</text>
    <text x="214" y="472" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" fill="#454B53">BM25 ranking written from scratch · FastAPI · inverted index</text>
  </g>

  <!-- lens kit -->
  <text x="78" y="518" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="10" letter-spacing="2.6" fill="#7C848D">STACK</text>
  <text x="78" y="544" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11" letter-spacing="0.5" fill="#454B53">PYTHON · PYTORCH · ONNX · HF TRANSFORMERS · FASTAPI · REACT</text>
  <text x="78" y="566" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11" letter-spacing="0.5" fill="#454B53">AWS · TERRAFORM · DYNAMODB · DOCKER · SQL</text>

  <!-- bottom controls -->
  <g>
    <rect x="66"  y="634" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
    <rect x="82"  y="634" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
    <rect x="98"  y="634" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
    <rect x="66"  y="650" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
    <rect x="82"  y="650" width="14" height="14" rx="3" fill="#CDD1D6" stroke="#868C93"/>
    <rect x="98"  y="650" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
    <rect x="66"  y="666" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
    <rect x="82"  y="666" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
    <rect x="98"  y="666" width="14" height="14" rx="3" fill="url(#knob)" stroke="#868C93"/>
  </g>
  <text x="410" y="662" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="9" letter-spacing="2" fill="#7C848D">MENU · PLAY · HOME</text>
  <circle cx="734" cy="658" r="24" fill="url(#knob)" stroke="#868C93" stroke-width="1"/>
  <circle cx="734" cy="658" r="8" fill="#CDD1D6" stroke="#868C93" stroke-width="1"/>
</svg>

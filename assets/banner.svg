<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEAF3"/>
      <stop offset="0.55" stop-color="#FFD3E5"/>
      <stop offset="1" stop-color="#FFC0DC"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF6FB"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#FFF4FA"/>
      <stop offset="1" stop-color="#E7DAFB"/>
    </radialGradient>
    <radialGradient id="knob" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#FFE49F"/>
      <stop offset="1" stop-color="#FFCF63"/>
    </radialGradient>
  </defs>

  <!-- panel -->
  <rect x="4" y="4" width="992" height="292" rx="30" fill="#FFF6FA" stroke="#FFDCEA" stroke-width="1.5"/>

  <!-- deco: sparkles + hearts -->
  <g>
    <path d="M0,-11 C1.5,-4 4,-1.5 11,0 C4,1.5 1.5,4 0,11 C-1.5,4 -4,1.5 -11,0 C-4,-1.5 -1.5,-4 0,-11 Z" transform="translate(40,50) scale(1.1)" fill="#FFD36B"/>
    <path d="M0,-11 C1.5,-4 4,-1.5 11,0 C4,1.5 1.5,4 0,11 C-1.5,4 -4,1.5 -11,0 C-4,-1.5 -1.5,-4 0,-11 Z" transform="translate(36,160) scale(1.6)" fill="#CBB2EC"/>
    <path d="M0,-11 C1.5,-4 4,-1.5 11,0 C4,1.5 1.5,4 0,11 C-1.5,4 -4,1.5 -11,0 C-4,-1.5 -1.5,-4 0,-11 Z" transform="translate(966,168) scale(1.25)" fill="#FFD36B"/>
    <path d="M0,-11 C1.5,-4 4,-1.5 11,0 C4,1.5 1.5,4 0,11 C-1.5,4 -4,1.5 -11,0 C-4,-1.5 -1.5,-4 0,-11 Z" transform="translate(958,254) scale(1.0)" fill="#CBB2EC"/>
    <path d="M0,3 C0,3 -7,-2 -7,-7 C-7,-10 -4,-11 -2,-9.5 C-1,-8.5 0,-7 0,-6 C0,-7 1,-8.5 2,-9.5 C4,-11 7,-10 7,-7 C7,-2 0,3 0,3 Z" transform="translate(956,50) scale(1.5)" fill="#FF9DC3"/>
    <path d="M0,3 C0,3 -7,-2 -7,-7 C-7,-10 -4,-11 -2,-9.5 C-1,-8.5 0,-7 0,-6 C0,-7 1,-8.5 2,-9.5 C4,-11 7,-10 7,-7 C7,-2 0,3 0,3 Z" transform="translate(56,250) scale(1.2)" fill="#9BDCC0"/>
    <circle cx="500" cy="26" r="3" fill="#FF9DC3"/>
    <circle cx="30" cy="206" r="3" fill="#FFD36B"/>
    <circle cx="974" cy="112" r="3" fill="#9BDCC0"/>
  </g>

  <!-- camera body (faux shadow + body) -->
  <rect x="70" y="54" width="860" height="204" rx="46" fill="#F7C7DB" opacity="0.55"/>
  <rect x="70" y="48" width="860" height="204" rx="46" fill="url(#body)" stroke="#F0A0C1" stroke-width="2.5"/>
  <ellipse cx="500" cy="92" rx="400" ry="40" fill="#FFFFFF" opacity="0.28"/>

  <!-- top band: brand + control buttons + shutter -->
  <text x="120" y="76" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="10" font-weight="700" letter-spacing="2.6" fill="#B07C90">CRYSTAL·<tspan fill="#E8749A">SHOT</tspan></text>
  <circle cx="758" cy="66" r="9" fill="#B8E9D2" stroke="#8FCFB4" stroke-width="1.5"/>
  <circle cx="792" cy="66" r="9" fill="#D9C6F7" stroke="#B79CE6" stroke-width="1.5"/>
  <circle cx="882" cy="64" r="18" fill="url(#knob)" stroke="#EDB94E" stroke-width="1.5"/>
  <circle cx="876" cy="58" r="5" fill="#FFFFFF" opacity="0.7"/>

  <!-- LCD screen -->
  <rect x="104" y="84" width="560" height="136" rx="16" fill="url(#screen)" stroke="#6B4A57" stroke-width="2.5"/>
  <g stroke="#F3A6C4" stroke-width="1.6" fill="none">
    <path d="M120,100 h15 M120,100 v15"/>
    <path d="M648,100 h-15 M648,100 v15"/>
    <path d="M120,204 h15 M120,204 v-15"/>
    <path d="M648,204 h-15 M648,204 v-15"/>
  </g>

  <!-- HUD -->
  <g font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="10.5">
    <circle cx="150" cy="112" r="4" fill="#F0708A"/>
    <text x="160" y="116" font-weight="700" letter-spacing="1" fill="#F0708A">REC</text>
    <text x="206" y="116" letter-spacing="1" fill="#B07C90">2026·07·13</text>
    <rect x="602" y="107" width="20" height="10" rx="2" fill="none" stroke="#B07C90" stroke-width="1"/>
    <rect x="604.5" y="109.5" width="12" height="5" fill="#B07C90"/>
    <rect x="622" y="110" width="2.4" height="4" fill="#B07C90"/>
  </g>

  <!-- identity -->
  <text x="384" y="140" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="9.5" letter-spacing="2.4" fill="#B07C90">UC BERKELEY · CS + APPLIED MATH</text>
  <text x="384" y="180" text-anchor="middle" font-size="36" font-weight="700" letter-spacing="4" fill="#5A3A48">CRYSTAL CHENG</text>
  <text x="384" y="206" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11" letter-spacing="2" fill="#8A6B78">SOFTWARE ENGINEER · ML / AI</text>

  <!-- lens -->
  <circle cx="802" cy="156" r="58" fill="#E7DAFB" stroke="#C9B0EA" stroke-width="2"/>
  <circle cx="802" cy="156" r="44" fill="#FFC7DE" stroke="#F0A0C1" stroke-width="1.5"/>
  <circle cx="802" cy="156" r="30" fill="url(#lens)"/>
  <circle cx="802" cy="156" r="15" fill="#C58FB0"/>
  <circle cx="793" cy="147" r="5" fill="#FFFFFF" opacity="0.85"/>
  <text x="802" y="232" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="9" letter-spacing="1.5" fill="#B07C90">AUTO · f2.8</text>
</svg>

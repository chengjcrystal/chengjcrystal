<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 270" width="1000" height="270" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFF1F3"/>
      <stop offset="0.46" stop-color="#CDD1D6"/>
      <stop offset="1" stop-color="#A6ABB2"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A6ABB2"/>
      <stop offset="1" stop-color="#CDD1D6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2F6"/>
    </linearGradient>
    <radialGradient id="knob" cx="0.38" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#EFF1F3"/>
      <stop offset="1" stop-color="#A6ABB2"/>
    </radialGradient>
  </defs>

  <!-- body -->
  <rect x="8" y="8" width="984" height="254" rx="26" fill="url(#body)" stroke="#868C93" stroke-width="1"/>

  <!-- top deck -->
  <text x="40" y="46" font-size="12" font-weight="700" letter-spacing="3.4" fill="#454B53">CRYSTAL·<tspan fill="#39628A">SHOT</tspan></text>
  <circle cx="892" cy="42" r="2" fill="#868C93"/>
  <circle cx="902" cy="42" r="2" fill="#868C93"/>
  <circle cx="912" cy="42" r="2" fill="#868C93"/>
  <circle cx="956" cy="42" r="14" fill="url(#knob)" stroke="#868C93" stroke-width="1"/>

  <!-- LCD frame + screen -->
  <rect x="36" y="64" width="928" height="182" rx="16" fill="url(#frame)"/>
  <rect x="48" y="76" width="904" height="158" rx="10" fill="url(#screen)" stroke="#22272C" stroke-width="2"/>

  <!-- focus brackets -->
  <g stroke="#A6ADB5" stroke-width="1.5" fill="none">
    <path d="M64,90 h16 M64,90 v16"/>
    <path d="M936,90 h-16 M936,90 v16"/>
    <path d="M64,220 h16 M64,220 v-16"/>
    <path d="M936,220 h-16 M936,220 v-16"/>
  </g>

  <!-- HUD -->
  <g font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11">
    <circle cx="86" cy="106" r="4" fill="#C4564C"/>
    <text x="96" y="110" font-weight="700" letter-spacing="1" fill="#C4564C">REC</text>
    <text x="146" y="110" letter-spacing="1" fill="#39628A">2026·07·13</text>
    <rect x="886" y="102" width="19" height="10" rx="2" fill="none" stroke="#7C848D" stroke-width="1"/>
    <rect x="888.5" y="104.5" width="11" height="5" fill="#7C848D"/>
    <rect x="905" y="105" width="2.4" height="4" fill="#7C848D"/>
  </g>

  <!-- identity -->
  <text x="500" y="150" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="10" letter-spacing="2.6" fill="#7C848D">UC BERKELEY · CS + APPLIED MATH</text>
  <text x="500" y="196" text-anchor="middle" font-size="44" font-weight="700" letter-spacing="6" fill="#14181D">CRYSTAL CHENG</text>
  <text x="500" y="224" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" letter-spacing="2.2" fill="#454B53">SOFTWARE ENGINEER · ML / AI</text>
</svg>
